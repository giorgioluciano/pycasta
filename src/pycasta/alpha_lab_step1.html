<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alpha Lab Step 1</title>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;height:100vh;overflow:hidden;}
#sidebar{width:280px;min-width:220px;background:#16213e;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;border-right:1px solid #0f3460;}
#main{flex:1;display:flex;flex-direction:column;}
#viewer-wrap{flex:1;background:#000;position:relative;}
#viewer{width:100%;height:100%;}
#bottom-bar{height:160px;background:#16213e;border-top:1px solid #0f3460;padding:8px;display:flex;gap:8px;}
#hist-panel{flex:1;}
#stats-panel{width:180px;font-size:11px;line-height:1.6;}
h3{font-size:12px;color:#4fc3f7;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
label{font-size:11px;color:#b0bec5;display:block;margin-bottom:2px;}
input[type=text],input[type=number],select{width:100%;background:#0f3460;border:1px solid #1a4a8a;color:#e0e0e0;padding:4px 6px;border-radius:3px;font-size:12px;}
button{width:100%;padding:6px;border:none;border-radius:3px;cursor:pointer;font-size:12px;margin-bottom:2px;}
.btn-primary{background:#0f3460;color:#4fc3f7;}
.btn-primary:hover{background:#1a4a8a;}
.btn-success{background:#1b5e20;color:#a5d6a7;}
.btn-success:hover{background:#2e7d32;}
.btn-warning{background:#4a3000;color:#ffcc02;}
.btn-warning:hover{background:#6a4500;}
.btn-danger{background:#4a0000;color:#ff8a80;}
.btn-danger:hover{background:#6a0000;}
.chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.chip{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.chip.active{border-color:#fff;}
.section{background:#0f3460;border-radius:4px;padding:8px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.radio-group{display:flex;gap:8px;}
.radio-group label{display:flex;align-items:center;gap:4px;cursor:pointer;}
#status{font-size:11px;color:#ffcc02;min-height:16px;}
#hist-canvas{width:100%;height:130px;}
</style>
</head>
<body>
<div id="sidebar">
<h3>Data Source</h3>
<div class="section">
<label>Data Directory</label>
<input type="text" id="inp-datadir" placeholder="C:\path\to\pdbs" />
<button class="btn-primary" onclick="setDataDir()" style="margin-top:4px">Set Directory</button>
<label style="margin-top:6px">PDB File</label>
<select id="sel-mol"><option value="">-- select --</option></select>
</div>
<h3>Alpha Parameters</h3>
<div class="section">
<div class="row2">
<div><label>Alpha (A)</label><input type="number" id="inp-alpha" value="1.4" step="0.1" min="0.1"></div>
<div><label>Max Tetras</label><input type="number" id="inp-maxtet" value="2000" step="1000" min="1000"></div>
</div>
<label style="margin-top:6px">Delaunay Mode</label>
<div class="radio-group">
<label><input type="radio" name="dlmode" value="standard" checked> Standard</label>
<label><input type="radio" name="dlmode" value="weighted"> Weighted</label>
</div>
</div>
<h3>Layers</h3>
<div class="section">
<label><input type="checkbox" id="chk-in" checked> Interior tetrahedra</label>
<label><input type="checkbox" id="chk-out" checked> Exterior tetrahedra</label>
<label><input type="checkbox" id="chk-mol"> Molecule atoms</label>
</div>
<h3>Appearance</h3>
<div class="section">
<label>Interior Color</label>
<div class="chip-row" id="chips-in"></div>
<label>Exterior Color</label>
<div class="chip-row" id="chips-out"></div>
<label>Background</label>
<div class="chip-row" id="chips-bg"></div>
<div class="row2" style="margin-top:6px">
<div><label>Line Width</label><input type="number" id="inp-lw" value="0.05" step="0.01" min="0.01" max="1"></div>
<div><label>Opacity</label><input type="number" id="inp-op" value="0.7" step="0.05" min="0.1" max="1"></div>
</div>
</div>
<button class="btn-success" onclick="compute()">Compute & Render</button>
<button class="btn-primary" onclick="resetView()">Reset View</button>
<button class="btn-warning" onclick="exportImg()">Export Image</button>
<div id="status"></div>
</div>
<div id="main">
<div id="viewer-wrap"><div id="viewer"></div></div>
<div id="bottom-bar">
<div id="hist-panel">
<h3>Circumradius Histogram</h3>
<canvas id="hist-canvas"></canvas>
</div>
<div id="stats-panel">
<h3>Stats</h3>
<div id="stats-content">No data yet.</div>
</div>
</div>
</div>
<script>
const COLORS_IN  = ['#00e5ff','#69f0ae','#ff6d00','#d500f9','#ffea00','#ffffff'];
const COLORS_OUT = ['#ff1744','#ff9100','#76ff03','#2979ff','#e040fb','#546e7a'];
const COLORS_BG  = ['#000000','#111122','#1a1a2e','#ffffff','#e8e8e8','#263238'];
const state = {
  colorIn:  COLORS_IN[0],
  colorOut: COLORS_OUT[0],
  colorBg:  COLORS_BG[0],
  lineWidth: 0.05,
  opacity:   0.7,
  data: null
};
let viewer = null;

function sf(v, d=3){ return (typeof v === 'number' && isFinite(v)) ? v.toFixed(d) : '?'; }

function buildChips(containerId, colors, stateKey) {
  const c = document.getElementById(containerId);
  colors.forEach(col => {
    const d = document.createElement('div');
    d.className = 'chip' + (state[stateKey]===col ? ' active' : '');
    d.style.background = col;
    d.title = col;
    d.onclick = () => {
      state[stateKey] = col;
      c.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      if(stateKey==='colorBg') applyBg();
      if(state.data) renderScene();
    };
    c.appendChild(d);
  });
}

function applyBg() {
  const bg = state.colorBg;
  document.getElementById('viewer-wrap').style.background = bg;
  document.getElementById('viewer').style.background = bg;
  if(viewer) { viewer.setBackgroundColor(bg); viewer.render(); }
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function setDataDir() {
  const dir = document.getElementById('inp-datadir').value.trim();
  if(!dir) return setStatus('Enter a directory path first.');
  setStatus('Setting directory...');
  try {
    const r = await fetch('/api/set_data_dir', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({dir})});
    const j = await r.json();
    if(j.ok) { setStatus('Directory set. Loading files...'); loadMolList(); }
    else setStatus('Error: ' + j.error);
  } catch(e) { setStatus('Server error: ' + e); }
}

async function loadMolList() {
  try {
    const r = await fetch('/api/lab/pdb_list');
    const mols = await r.json();
    const sel = document.getElementById('sel-mol');
    sel.innerHTML = '<option value="">-- select --</option>';
    mols.forEach(m => { const o=document.createElement('option'); o.value=m; o.textContent=m; sel.appendChild(o); });
    setStatus(mols.length + ' files found.');
  } catch(e) { setStatus('Could not load file list.'); }
}

async function compute() {
  const mol = document.getElementById('sel-mol').value;
  if(!mol) return setStatus('Select a PDB file first.');
  const alpha   = parseFloat(document.getElementById('inp-alpha').value) || 1.4;
  const maxtet  = parseInt(document.getElementById('inp-maxtet').value)  || 50000;
  const dlmode  = document.querySelector('input[name=dlmode]:checked').value;
  setStatus('Computing alpha shape...');
  try {
    const r = await fetch('/api/lab/compute_alpha', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mol, alpha, maxtet, mode: dlmode})
    });
    if(!r.ok) { setStatus('Server error ' + r.status); return; }
    state.data = await r.json();
    setStatus('Done. Rendering...');
    renderScene();
    drawHistogram();
    renderStats();
  } catch(e) { setStatus('Error: ' + e); }
}

function renderScene() {
  const d = state.data;
  if(!d) return;
  if(!viewer) {
    viewer = $3Dmol.createViewer(document.getElementById('viewer'), {
      backgroundColor: state.colorBg,
      antialias: false
    });
  }
  viewer.removeAllModels();
  viewer.removeAllShapes();
  const lw = parseFloat(document.getElementById('inp-lw').value) || state.lineWidth;
  const op = parseFloat(document.getElementById('inp-op').value) || state.opacity;
  const showIn  = document.getElementById('chk-in').checked;
  const showOut = document.getElementById('chk-out').checked;
  const showMol = document.getElementById('chk-mol').checked;

  if(showIn && d.lines_in && d.lines_in.length) {
    const [r,g,b] = hexToRgb(state.colorIn);
    for(let i=0;i<d.lines_in.length;i+=6){
      viewer.addLine({start:{x:d.lines_in[i],y:d.lines_in[i+1],z:d.lines_in[i+2]},
                      end:{x:d.lines_in[i+3],y:d.lines_in[i+4],z:d.lines_in[i+5]},
                      color:state.colorIn, linewidth:lw, opacity:op});
    }
  }
  if(showOut && d.lines_out && d.lines_out.length) {
    for(let i=0;i<d.lines_out.length;i+=6){
      viewer.addLine({start:{x:d.lines_out[i],y:d.lines_out[i+1],z:d.lines_out[i+2]},
                      end:{x:d.lines_out[i+3],y:d.lines_out[i+4],z:d.lines_out[i+5]},
                      color:state.colorOut, linewidth:lw, opacity:op});
    }
  }
  if(showMol && d.pdb_str) {
    const m = viewer.addModel(d.pdb_str, 'pdb');
    viewer.setStyle({model:m},{sphere:{radius:0.4, color:'#aaaaaa', opacity:0.6}});
  }
  applyBg();
  viewer.zoomTo();
  viewer.render();
  setStatus('Rendered.');
}

function resetView() { if(viewer) { viewer.zoomTo(); viewer.render(); } }

function exportImg() {
  if(!viewer) return;
  const uri = viewer.pngURI();
  const a = document.createElement('a');
  a.href = uri;
  a.download = 'alpha_lab_export.png';
  a.click();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return [r,g,b];
}

function drawHistogram() {
  const d = state.data;
  if(!d || !d.radii || !d.radii.length) return;
  const canvas = document.getElementById('hist-canvas');
  if(!canvas) return;
  canvas.width = canvas.offsetWidth || 400;
  canvas.height = canvas.offsetHeight || 130;
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  const radii = d.radii;
  const alpha = parseFloat(document.getElementById('inp-alpha').value) || 1.4;
  const bins = 50;
  const mn = Math.min(...radii);
  const mx = Math.min(Math.max(...radii), alpha*3);
  const step = (mx-mn)/bins || 0.1;
  const counts = new Array(bins).fill(0);
  radii.forEach(r => { const i=Math.min(bins-1, Math.floor((r-mn)/step)); counts[i]++; });
  const maxc = Math.max(...counts);
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const bw = W/bins;
  counts.forEach((c,i)=>{
    const x = i*bw;
    const barH = (c/maxc)*(H-20);
    const binMid = mn + (i+0.5)*step;
    ctx.fillStyle = binMid <= alpha ? '#00e5ff' : '#ff1744';
    ctx.fillRect(x, H-20-barH, bw-1, barH);
  });
  // alpha line
  const ax = ((alpha-mn)/step) * bw;
  ctx.strokeStyle = '#ffea00';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ax,0); ctx.lineTo(ax,H-20); ctx.stroke();
  ctx.fillStyle='#ffea00'; ctx.font='10px sans-serif';
  ctx.fillText('a='+alpha.toFixed(2), ax+2, 12);
}

function renderStats() {
  const d = state.data;
  if(!d) return;
  const alpha = parseFloat(document.getElementById('inp-alpha').value) || 1.4;
  const total = (d.n_total!=null) ? d.n_total : '?';
  const nin   = (d.n_in!=null)    ? d.n_in    : '?';
  const nout  = (d.n_out!=null)   ? d.n_out   : '?';
  document.getElementById('stats-content').innerHTML =
    'Molecule: ' + (d.mol||'?') + '<br>' +
    'Alpha: ' + sf(alpha) + ' A<br>' +
    'Mode: ' + (d.mode||'?') + '<br>' +
    'Total tetras: ' + total + '<br>' +
    'Interior: ' + nin + '<br>' +
    'Exterior: ' + nout + '<br>' +
    'Atoms: ' + (d.n_atoms||'?');
}

// Init
buildChips('chips-in',  COLORS_IN,  'colorIn');
buildChips('chips-out', COLORS_OUT, 'colorOut');
buildChips('chips-mol', COLORS_OUT, 'colorMol');  // nuovo
buildChips('chips-bg',  COLORS_BG,  'colorBg');
applyBg();
</script>
</body>
</html>
