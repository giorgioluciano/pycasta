<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PyCASTA Pocket Viewer</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<style>
*{box-sizing:border-box;}
body{margin:0;padding:0;background:#1a1a2e;color:#e0e0e0;font-family:sans-serif;font-size:13px;}
#app{display:grid;grid-template-columns:280px 1fr 280px;grid-template-rows:auto 1fr;height:100vh;gap:6px;padding:8px;}
header{grid-column:1/4;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;border-bottom:1px solid #0f3460;padding-bottom:6px;}
header h1{font-size:15px;margin:0;letter-spacing:0.08em;text-transform:uppercase;color:#4fc3f7;}
header .subtitle{font-size:11px;color:#b0bec5;margin-left:10px;}
header .stats{font-size:11px;color:#4fc3f7;}
.panel{background:#16213e;border-radius:6px;padding:10px;border:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden;}
#viewer{width:100%;height:100%;border-radius:6px;overflow:hidden;background:#000;position:relative;}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#4fc3f7;margin-bottom:6px;margin-top:4px;}
.field{margin-bottom:8px;}
label{display:block;font-size:11px;color:#b0bec5;margin-bottom:3px;}
select,button{width:100%;box-sizing:border-box;padding:5px 8px;border-radius:3px;border:1px solid #0f3460;background:#0f3460;color:#e0e0e0;font-size:12px;}
select:focus,button:focus{outline:1px solid #4fc3f7;outline-offset:1px;}
button{cursor:pointer;background:#0f3460;border-color:#1a4a8a;color:#4fc3f7;font-weight:500;margin-bottom:2px;}
button:hover{background:#1a4a8a;}
button.secondary{background:#16213e;border-color:#0f3460;color:#b0bec5;}
button.secondary:hover{background:#0f3460;}
button.small{font-size:11px;padding:3px 6px;width:auto;}
.toolbar{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;margin-bottom:4px;}
.checkbox-row{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:11px;margin-bottom:4px;}
.checkbox-row label{display:flex;align-items:center;gap:4px;font-size:11px;margin:0;cursor:pointer;}
.checkbox-row input{margin:0;accent-color:#4fc3f7;}
.section{margin-bottom:8px;}
#pocket-cards{flex:1;overflow-y:auto;padding-right:4px;}
#pocket-cards::-webkit-scrollbar{width:4px;}
#pocket-cards::-webkit-scrollbar-track{background:#0f3460;}
#pocket-cards::-webkit-scrollbar-thumb{background:#1a4a8a;border-radius:2px;}
.pocket-card{background:#0f1a35;border-radius:5px;padding:8px;margin-bottom:6px;border-left:3px solid #607d8b;border:1px solid #0f3460;border-left-width:3px;cursor:pointer;transition:background 0.15s,transform 0.1s;}
.pocket-card:hover{background:#16213e;transform:translateY(-1px);}
.pocket-card.selected{background:#0d2244;border-color:#4fc3f7;}
.pocket-card.dimmed{opacity:0.35;}
.p-title{font-size:12px;font-weight:600;margin-bottom:4px;}
.p-row{display:flex;justify-content:space-between;font-size:11px;color:#b0bec5;margin:2px 0;}
.p-row span:last-child{color:#e0e0e0;}
.badge{font-size:10px;padding:1px 5px;border-radius:999px;margin-left:4px;background:#1b3a28;color:#69f0ae;border:1px solid #4caf50;}
.badge.hit{background:#0d2e1e;color:#b9f6ca;}
#loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,15,30,0.7);backdrop-filter:blur(2px);z-index:10;color:#4fc3f7;font-size:13px;}
#alpha-info{font-size:11px;color:#b0bec5;padding:6px 8px;border-radius:4px;background:#0f1a35;border:1px solid #0f3460;margin-top:6px;display:none;}
#selection-hint{font-size:10px;color:#b0bec5;margin-top:4px;display:none;}
input[type=range]{accent-color:#4fc3f7;width:100%;margin-top:3px;}
input[type=text]{width:100%;box-sizing:border-box;padding:4px 7px;border-radius:3px;border:1px solid #0f3460;background:#0f3460;color:#e0e0e0;font-size:12px;}
/* chip shape */
.chip-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
.color-chip{display:inline-block;width:18px;height:18px;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color 0.15s,transform 0.1s;}
.color-chip:hover{transform:scale(1.2);}
.color-chip.active{border-color:#fff !important;}
body.chips-circle .color-chip{border-radius:50%;}
body.chips-square .color-chip{border-radius:3px;}
/* preset swatches */
.preset-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.preset-btn{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid #0f3460;background:#0f1a35;color:#b0bec5;cursor:pointer;white-space:nowrap;}
.preset-btn:hover{background:#0f3460;color:#4fc3f7;}
/* full picker grid */
#full-picker-wrap{margin-top:6px;}
#full-picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px;}
.fp-row{display:flex;align-items:center;gap:6px;font-size:11px;color:#b0bec5;}
.fp-swatch{width:16px;height:16px;border-radius:3px;border:1px solid #0f3460;cursor:pointer;flex-shrink:0;}
</style>
</head>
<body class="chips-circle">
<div id="app">
<header>
  <div style="display:flex;align-items:baseline;">
    <h1>PyCASTA</h1>
    <span class="subtitle">Pocket Viewer</span>
  </div>
  <span class="stats" id="stats">Select a dataset</span>
</header>

<!-- LEFT PANEL -->
<div class="panel">

  <div class="section">
    <div class="section-title">Data Source</div>
    <div class="field">
      <label>PDB Directory</label>
      <div style="display:flex;gap:4px;">
        <input type="text" id="inp-pdb-dir" placeholder="C:\path\to\pdbs" style="flex:1">
        <button class="small" onclick="setPdbDir()" style="width:auto;white-space:nowrap">Set</button>
      </div>
    </div>
    <div class="field">
      <label>Dataset</label>
      <select id="sel-dataset"><option value="">— select —</option></select>
    </div>
    <div class="field">
      <label>Molecule</label>
      <select id="sel-molecule"><option value="">— select molecule —</option></select>
    </div>
  </div>

  <div class="toolbar">
    <button class="secondary small" id="btn-reset">Reset view</button>
    <button class="secondary small" id="btn-style">Toggle style</button>
    <button class="secondary small" id="btn-clear-sel">Clear sel.</button>
    <button class="secondary small" id="btn-export">Export JSON</button>
  </div>

  <div class="section">
    <div class="section-title">Layers</div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="ly-protein" checked> Protein</label>
      <label><input type="checkbox" id="ly-ligand" checked> Ligand</label>
    </div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="ly-pockets" checked> Pocket pts</label>
      <label><input type="checkbox" id="ly-centroids" checked> Centroids</label>
    </div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="ly-mouth" checked> Mouth</label>
      <label><input type="checkbox" id="ly-mesh" checked> Mesh</label>
    </div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="ly-alpha-in" checked> α inside</label>
      <label><input type="checkbox" id="ly-alpha-out"> α outside</label>
    </div>
    <div class="field" style="margin-top:4px">
      <label>α line width &nbsp;<b id="lw-val">1.5</b> px</label>
      <input type="range" id="slider-lw" min="0.5" max="4" step="0.25" value="1.5">
    </div>
    <div class="field">
      <label>α opacity &nbsp;<b id="op-val">40</b> %</label>
      <input type="range" id="slider-op" min="5" max="90" step="5" value="40">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Appearance</div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <span style="font-size:11px;color:#b0bec5">Chip shape:</span>
      <div style="display:flex;gap:4px;">
        <button class="small secondary" id="btn-circle" onclick="setChipShape('circle')">&#9679; Circle</button>
        <button class="small secondary" id="btn-square" onclick="setChipShape('square')">&#9632; Square</button>
      </div>
    </div>

    <label>Presets</label>
    <div class="preset-row">
      <span class="preset-btn" onclick="applyPreset('dark')">Dark</span>
      <span class="preset-btn" onclick="applyPreset('light')">Light</span>
      <span class="preset-btn" onclick="applyPreset('neon')">Neon</span>
      <span class="preset-btn" onclick="applyPreset('pastel')">Pastel</span>
      <span class="preset-btn" onclick="applyPreset('mono')">Mono</span>
    </div>

    <label>Quick colors</label>
    <div class="chip-row" id="quick-chips"></div>

    <div id="full-picker-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:11px;color:#b0bec5">All colors</span>
        <button class="small secondary" onclick="toggleFullPicker()">Expand</button>
      </div>
      <div id="full-picker-grid" style="display:none;"></div>
    </div>
  </div>

  <div id="alpha-info"></div>
</div>

<!-- CENTER -->
<div class="panel" style="position:relative;">
  <div id="viewer"></div>
  <div id="loading">Loading molecule…</div>
</div>

<!-- RIGHT PANEL -->
<div class="panel">
  <div class="section-title">Pockets</div>
  <div style="font-size:10px;color:#b0bec5;margin-bottom:6px" id="selection-hint">Click to focus &middot; Ctrl+click multi-select</div>
  <div id="pocket-cards"></div>
</div>

</div>
